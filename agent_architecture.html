<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Agent Architecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1117; font-family: 'SF Mono', 'Fira Code', monospace; }
.wrap { padding: 28px 32px; }
h1 { font-size: 18px; color: #7dd3fc; letter-spacing: 2px; margin-bottom: 4px; }
.sub { font-size: 11px; color: #475569; margin-bottom: 24px; }
svg { display: block; width: 100%; height: auto; }
.tooltip {
  position: fixed; background: #1e293b; border: 1px solid #334155;
  border-radius: 8px; padding: 12px 16px; font-size: 11px; line-height: 1.7;
  max-width: 300px; pointer-events: none; opacity: 0; transition: opacity .15s;
  z-index: 99; color: #cbd5e1;
}
.tooltip.on { opacity: 1; }
.tooltip b { color: #7dd3fc; display: block; margin-bottom: 6px; font-size: 12px; }
.tag { background: #0f172a; border: 1px solid #334155; border-radius: 3px;
  padding: 1px 5px; font-size: 10px; color: #94a3b8; margin: 1px; display: inline-block; }
.w { color: #fbbf24; } .g { color: #34d399; }
.legend { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
.li { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; }
.ld { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">
<h1>MULTIMODAL CUSTOMER SERVICE AGENT</h1>
<p class="sub">LangGraph · Claude claude-sonnet-4-6 · Qdrant Hybrid Search · commit 66feae9</p>
<svg viewBox="0 0 1100 840" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a0" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#475569"/></marker>
  <marker id="ag" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#34d399"/></marker>
  <marker id="ay" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#fbbf24"/></marker>
  <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#f87171"/></marker>
  <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#161b27" stroke-width="0.5"/>
  </pattern>
</defs>
<rect width="1100" height="840" fill="url(#grid)"/>

<!-- ===== INPUT ===== -->
<g class="node" data-id="input">
  <rect x="390" y="20" width="220" height="44" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="38" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">INPUT</text>
  <text x="500" y="54" text-anchor="middle" fill="#94a3b8" font-size="11">question + image_b64?</text>
</g>
<line x1="500" y1="64" x2="500" y2="88" stroke="#334155" stroke-width="1.5" marker-end="url(#a0)"/>

<!-- ===== QUESTION ANALYZER ===== -->
<g class="node" data-id="qa">
  <rect x="360" y="90" width="280" height="68" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="500" y="110" text-anchor="middle" fill="#60a5fa" font-size="9" letter-spacing="1">NODE 1 · 1× Claude call</text>
  <text x="500" y="130" text-anchor="middle" fill="#dbeafe" font-size="14" font-weight="bold">QuestionAnalyzer</text>
  <text x="500" y="150" text-anchor="middle" fill="#93c5fd" font-size="10">type · product · sub_questions · sub_q_dependent</text>
</g>
<line x1="500" y1="158" x2="500" y2="188" stroke="#334155" stroke-width="1.5" marker-end="url(#a0)"/>

<!-- Route diamond 1 -->
<polygon points="500,190 556,218 500,246 444,218" fill="#1a2030" stroke="#475569" stroke-width="1.5"/>
<text x="500" y="214" text-anchor="middle" fill="#94a3b8" font-size="10">question_type</text>
<text x="500" y="228" text-anchor="middle" fill="#64748b" font-size="9">route_by_question_type</text>

<!-- policy branch left -->
<line x1="444" y1="218" x2="240" y2="218" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#ay)"/>
<text x="342" y="211" text-anchor="middle" fill="#fbbf24" font-size="10">policy</text>

<!-- manual branch right -->
<line x1="556" y1="218" x2="760" y2="218" stroke="#a855f7" stroke-width="1.5" marker-end="url(#a0)"/>
<text x="658" y="211" text-anchor="middle" fill="#a855f7" font-size="10">manual</text>

<!-- ===== POLICY RESPONDER ===== -->
<g class="node" data-id="policy">
  <rect x="80" y="188" width="160" height="72" rx="7" fill="#1c2a1c" stroke="#4ade80" stroke-width="1.5"/>
  <text x="160" y="208" text-anchor="middle" fill="#86efac" font-size="9" letter-spacing="1">NODE 2A</text>
  <text x="160" y="226" text-anchor="middle" fill="#dcfce7" font-size="12" font-weight="bold">PolicyResponder</text>
  <text x="160" y="244" text-anchor="middle" fill="#86efac" font-size="9">dense_search_policy (k=3)</text>
  <text x="160" y="256" text-anchor="middle" fill="#86efac" font-size="9">dense_search_manual_policy (k=3)</text>
</g>
<!-- policy → AnswerGenerator -->
<path d="M160,260 L160,430 L360,430" stroke="#4ade80" stroke-width="1.5" fill="none" marker-end="url(#ag)" stroke-dasharray="5,3"/>

<!-- ===== RETRIEVER ===== -->
<g class="node" data-id="retriever">
  <rect x="760" y="178" width="260" height="100" rx="7" fill="#2d1b4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="890" y="198" text-anchor="middle" fill="#d8b4fe" font-size="9" letter-spacing="1">NODE 2B</text>
  <text x="890" y="218" text-anchor="middle" fill="#f3e8ff" font-size="13" font-weight="bold">Retriever</text>
  <rect x="772" y="226" width="70" height="22" rx="3" fill="#1e1035" stroke="#7c3aed" stroke-width="1"/>
  <text x="807" y="241" text-anchor="middle" fill="#c4b5fd" font-size="9">Dense</text>
  <rect x="848" y="226" width="70" height="22" rx="3" fill="#1e1035" stroke="#7c3aed" stroke-width="1"/>
  <text x="883" y="241" text-anchor="middle" fill="#fbbf24" font-size="9">Sparse ⚠</text>
  <rect x="924" y="226" width="84" height="22" rx="3" fill="#1e1035" stroke="#7c3aed" stroke-width="1"/>
  <text x="966" y="241" text-anchor="middle" fill="#c4b5fd" font-size="9">RRF Fusion</text>
  <text x="890" y="268" text-anchor="middle" fill="#7c3aed" font-size="9">Fallback: term-match → LLM product inference</text>
</g>
<line x1="890" y1="278" x2="890" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#a0)"/>

<!-- Route diamond 2 -->
<polygon points="890,310 940,335 890,360 840,335" fill="#1a2030" stroke="#475569" stroke-width="1.5"/>
<text x="890" y="331" text-anchor="middle" fill="#94a3b8" font-size="10">retrieval_failed</text>
<text x="890" y="345" text-anchor="middle" fill="#64748b" font-size="9">route_after_retrieval</text>

<!-- True → FallbackResponder -->
<line x1="940" y1="335" x2="1010" y2="335" stroke="#f87171" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="975" y="328" text-anchor="middle" fill="#f87171" font-size="9">True</text>
<g class="node" data-id="fallback">
  <rect x="1010" y="310" width="72" height="50" rx="6" fill="#2d1515" stroke="#f87171" stroke-width="1.5"/>
  <text x="1046" y="330" text-anchor="middle" fill="#fca5a5" font-size="9">Fallback</text>
  <text x="1046" y="345" text-anchor="middle" fill="#fca5a5" font-size="9">Responder</text>
  <text x="1046" y="358" text-anchor="middle" fill="#f87171" font-size="9">→ END</text>
</g>

<!-- False → AnswerGenerator -->
<line x1="840" y1="335" x2="640" y2="335" stroke="#34d399" stroke-width="1.5"/>
<line x1="640" y1="335" x2="640" y2="430" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="740" y="328" text-anchor="middle" fill="#34d399" font-size="9">False</text>

<!-- ===== ANSWER GENERATOR ===== -->
<g class="node" data-id="gen">
  <rect x="360" y="430" width="280" height="80" rx="7" fill="#1a2535" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)"/>
  <text x="500" y="450" text-anchor="middle" fill="#7dd3fc" font-size="9" letter-spacing="1">NODE 3 · 1× Claude multimodal call</text>
  <text x="500" y="470" text-anchor="middle" fill="#e0f2fe" font-size="14" font-weight="bold">AnswerGenerator</text>
  <text x="500" y="490" text-anchor="middle" fill="#38bdf8" font-size="10">top-5 images by freq · JSON → {answer, image_ids}</text>
  <text x="500" y="504" text-anchor="middle" fill="#1d4ed8" font-size="9">retry: injects validation_feedback into prompt</text>
</g>
<line x1="500" y1="510" x2="500" y2="538" stroke="#334155" stroke-width="1.5" marker-end="url(#a0)"/>

<!-- ===== VALIDATOR ===== -->
<g class="node" data-id="validator">
  <rect x="360" y="540" width="280" height="108" rx="7" fill="#1f1a10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="500" y="560" text-anchor="middle" fill="#fcd34d" font-size="9" letter-spacing="1">NODE 4 · 1× Claude call (check ④ only)</text>
  <text x="500" y="578" text-anchor="middle" fill="#fef3c7" font-size="14" font-weight="bold">Validator</text>
  <text x="500" y="598" text-anchor="middle" fill="#fbbf24" font-size="10">① &lt;PIC&gt; count == len(image_ids)</text>
  <text x="500" y="614" text-anchor="middle" fill="#fbbf24" font-size="10">② image count ≤ MAX_IMAGES (5)</text>
  <text x="500" y="630" text-anchor="middle" fill="#fbbf24" font-size="10">③ numeric traceability in chunks</text>
  <text x="500" y="646" text-anchor="middle" fill="#fbbf24" font-size="10">④ sub-question coverage · Claude</text>
</g>
<line x1="500" y1="648" x2="500" y2="678" stroke="#334155" stroke-width="1.5" marker-end="url(#a0)"/>

<!-- Route diamond 3 -->
<polygon points="500,680 556,708 500,736 444,708" fill="#1a2030" stroke="#475569" stroke-width="1.5"/>
<text x="500" y="704" text-anchor="middle" fill="#94a3b8" font-size="10">validation_passed</text>
<text x="500" y="718" text-anchor="middle" fill="#64748b" font-size="9">route_after_validation</text>

<!-- True → END -->
<line x1="556" y1="708" x2="680" y2="708" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="618" y="701" text-anchor="middle" fill="#34d399" font-size="9">True</text>
<rect x="680" y="688" width="72" height="40" rx="7" fill="#0f2a1a" stroke="#34d399" stroke-width="1.5"/>
<text x="716" y="713" text-anchor="middle" fill="#34d399" font-size="14" font-weight="bold">END</text>

<!-- retry < 2 → back to Retriever -->
<line x1="444" y1="708" x2="300" y2="708" stroke="#fbbf24" stroke-width="1.5"/>
<path d="M300,708 L300,218 L444,218" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#ay)" stroke-dasharray="5,3"/>
<text x="290" y="465" text-anchor="middle" fill="#fbbf24" font-size="9" transform="rotate(-90,290,465)">False · retry&lt;2 → Retriever</text>

<!-- retry >= 2 → forced END -->
<line x1="500" y1="736" x2="500" y2="770" stroke="#f87171" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="430" y="772" width="140" height="32" rx="6" fill="#2d1515" stroke="#f87171" stroke-width="1"/>
<text x="500" y="793" text-anchor="middle" fill="#f87171" font-size="10">END · forced_pass (retry≥2)</text>

<!-- ===== RIGHT PANEL: Retriever Detail ===== -->
<rect x="760" y="400" width="260" height="130" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
<text x="890" y="420" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1">RETRIEVER DETAIL</text>
<text x="772" y="438" fill="#7c3aed" font-size="9">Dense: paraphrase-multilingual-MiniLM-L12-v2</text>
<text x="772" y="453" fill="#dc2626" font-size="9">Sparse: Splade_PP_en_v1  ⚠ EN-only model</text>
<text x="772" y="468" fill="#475569" font-size="9">Fusion: RRF (Reciprocal Rank Fusion)</text>
<text x="772" y="483" fill="#475569" font-size="9">Filter: product field in Qdrant</text>
<text x="772" y="498" fill="#475569" font-size="9">Lookup: child chunk → parent chunk (docstore)</text>
<line x1="760" y1="508" x2="1020" y2="508" stroke="#1e293b" stroke-width="1"/>
<text x="772" y="522" fill="#475569" font-size="9">L2 fallback: term_product_map string match</text>
<text x="772" y="537" fill="#475569" font-size="9">L3 fallback: Claude LLM product inference</text>

<!-- ===== RIGHT PANEL: Known Issues ===== -->
<rect x="760" y="550" width="260" height="100" rx="6" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="1"/>
<text x="890" y="570" text-anchor="middle" fill="#f87171" font-size="9" letter-spacing="1">KNOWN ISSUES</text>
<text x="772" y="588" fill="#fca5a5" font-size="9">⚠ Sparse EN-only → ZH retrieval degraded</text>
<text x="772" y="603" fill="#fca5a5" font-size="9">⚠ MiniLM too small for domain terminology</text>
<text x="772" y="618" fill="#fca5a5" font-size="9">⚠ Product filter may mismatch Qdrant labels</text>
<text x="772" y="633" fill="#fca5a5" font-size="9">⚠ V5 batch: 157/400 coverage (incomplete)</text>

<!-- ===== LEFT PANEL: State ===== -->
<rect x="20" y="400" width="200" height="200" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
<text x="120" y="420" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1">AGENT STATE</text>
<text x="32" y="438" fill="#334155" font-size="9">question / image_b64</text>
<text x="32" y="453" fill="#334155" font-size="9">question_type / product</text>
<text x="32" y="468" fill="#334155" font-size="9">sub_questions / sub_q_dependent</text>
<text x="32" y="483" fill="#334155" font-size="9">retrieved_chunks / candidate_images</text>
<text x="32" y="498" fill="#334155" font-size="9">retrieval_failed</text>
<text x="32" y="513" fill="#334155" font-size="9">accumulated_context</text>
<text x="32" y="528" fill="#334155" font-size="9">draft_answer / used_images</text>
<text x="32" y="543" fill="#334155" font-size="9">validation_passed / retry_count</text>
<text x="32" y="558" fill="#334155" font-size="9">validation_feedback</text>
<text x="32" y="573" fill="#334155" font-size="9">final_answer</text>
<line x1="20" y1="582" x2="220" y2="582" stroke="#1e293b" stroke-width="1"/>
<text x="32" y="596" fill="#475569" font-size="9">MAX_IMAGES_PER_ANSWER = 5</text>
<text x="32" y="611" fill="#475569" font-size="9">MAX_VALIDATOR_RETRIES = 2</text>

</svg>

<div class="legend">
  <div class="li"><div class="ld" style="background:#3b82f6"></div>LLM Node</div>
  <div class="li"><div class="ld" style="background:#a855f7"></div>Retrieval</div>
  <div class="li"><div class="ld" style="background:#4ade80"></div>Policy Path</div>
  <div class="li"><div class="ld" style="background:#f59e0b"></div>Validation</div>
  <div class="li"><div class="ld" style="background:#f87171"></div>Error/Fallback</div>
  <div class="li"><div class="ld" style="background:#fbbf24"></div>Retry Loop</div>
</div>
</div>

<div class="tooltip" id="tip"></div>
<script>
const T = {
  input: '<b>Input</b><span class="tag">question: str</span> <span class="tag">image_b64: Optional[str]</span><br>多模态输入，图片可选',
  qa: '<b>QuestionAnalyzer</b>1× Claude call<br><span class="tag">question_type</span> manual | policy<br><span class="tag">product</span> 产品名 or null<br><span class="tag">sub_questions</span> 最多3个<br><span class="tag">sub_q_dependent</span> 顺序依赖<br>降级: JSON失败 → manual全库',
  policy: '<b>PolicyResponder</b>dense_search_policy top_k=3<br>dense_search_manual_policy top_k=3<br>合并6 chunks → AnswerGenerator<br><span class="g">无图片，纯文本政策回答</span>',
  retriever: '<b>Retriever</b>Hybrid: Dense + Sparse + RRF<br><span class="w">⚠ Sparse=EN-only model</span><br>sub_q_dependent → 顺序+累积上下文<br>否则 → 并行检索<br>去重 parent_id<br>L2: term_product_map<br>L3: Claude LLM 推断产品',
  fallback: '<b>FallbackResponder</b>retrieval_failed=True 时触发<br>返回固定兜底文本<br>直接 → END，不经过 Validator',
  gen: '<b>AnswerGenerator</b>1× Claude 多模态调用<br>Top-5 图片按频次注入<br>输出 JSON: {answer, image_ids}<br>&lt;PIC&gt; 标记图片位置<br>retry 时注入 validation_feedback',
  validator: '<b>Validator</b>① &lt;PIC&gt; == len(image_ids)<br>② image_ids ≤ 5<br>③ 数值溯源检查<br>④ 子问题覆盖 (1× Claude)<br>失败 → retry++ → 回 Retriever<br>retry≥2 → forced_pass → END',
};
const tip = document.getElementById('tip');
document.querySelectorAll('.node').forEach(n => {
  const d = T[n.dataset.id]; if (!d) return;
  n.style.cursor = 'pointer';
  n.addEventListener('mousemove', e => {
    tip.innerHTML = d; tip.classList.add('on');
    tip.style.left = (e.clientX+14)+'px'; tip.style.top = (e.clientY-8)+'px';
  });
  n.addEventListener('mouseleave', () => tip.classList.remove('on'));
});
</script>
</div>
<div class="tooltip" id="tip"></div>
</body>
</html>
